name: Kiro Auto Bot - TikTok to YouTube

on:
  schedule:
    - cron: '0 */5 * * *' # يعمل كل 5 ساعات
  workflow_dispatch: # يتيح لك التشغيل اليدوي للتجربة

jobs:
  run-automation:
    runs-on: ubuntu-latest
    permissions:
      contents: write # ضروري لتحديث ملف history.json

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Tools (FFmpeg & yt-dlp)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          # تثبيت yt-dlp مع مكتبة التمويه لفك تشفير تيك توك
          pip install -U yt-dlp curl_cffi
          # التحقق من أن الميزة تعمل
          yt-dlp --list-impersonate-targets

      - name: Install Node Modules
        run: npm install googleapis

      - name: Run Kiro Bot
        run: node index.js

      - name: Save and Push History
        run: |
          git config --global user.name "Kiro Bot"
          git config --global user.email "bot@kirozozo.com"
          git add history.json
          # تجنب الخطأ في حال لم يتم العثور على فيديوهات جديدة
          git commit -m "Update history.json [skip ci]" || echo "لا توجد تحديثات جديدة للسجل"
          git push
